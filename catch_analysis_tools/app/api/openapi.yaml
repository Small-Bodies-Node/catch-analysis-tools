openapi: "3.0.0"

info:
  title: Catch Analysis Tools
  version: "1.0.0"
  description: >
    Astrometry + photometry pipeline API.
    Use the example payload below to quickly test with a known FITS image.

paths:
  /hello:
    get:
      operationId: catch_analysis_tools.app.handlers.hello.hello
      summary: Basic service liveness endpoint.
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: |
                  Catch Analysis Tools is running.
                  package_version=1.0.0
                  docker_image_tag=2026-02-11-001
  /health:
    get:
      operationId: catch_analysis_tools.app.handlers.health.health
      summary: Service health and astrometry data readiness.
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                type: object
  /reset:
    post:
      operationId: catch_analysis_tools.app.handlers.reset.reset
      summary: Force an astrometry data readiness recheck.
      responses:
        "202":
          description: Recheck started.
          content:
            application/json:
              schema:
                type: object
  /astrometry:
    post:
      tags:
        - Astrometry
      summary: Perform astrometry and optionally return a plot image.
      operationId: catch_analysis_tools.app.handlers.astrometry.do_astrometry

      requestBody:
        required: true
        description: >
          Provide parameters for astrometry solving, source detection,
          and photometric calibration.
        content:
          application/json:
            schema:
              type: object
              required:
                - image_url
              properties:
                image_url:
                  type: string
                  description: >
                    URL of FITS image OR local file path (if supported).
                  example: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"

                ra:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: 0
                  maximum: 360
                  description: Right Ascension (deg). Used only if use_ra_dec=true.

                dec:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: -90
                  maximum: 90
                  description: Declination (deg). Used only if use_ra_dec=true.

                use_ra_dec:
                  type: boolean
                  default: false
                  description: >
                    If true, constrain astrometry solve around (ra, dec).
                    If false, perform blind solve.

                pixel_scale:
                  type: number
                  nullable: true
                  default: 2.5
                  description: Pixel scale (arcsec/pixel). Used if scale_low/high not provided.

                scale_low:
                  type: number
                  nullable: true
                  default: null
                  description: Lower bound of pixel scale (arcsec/pixel).

                scale_high:
                  type: number
                  nullable: true
                  default: null
                  description: Upper bound of pixel scale (arcsec/pixel).

                search_radius:
                  type: number
                  default: 2.0
                  minimum: 0
                  description: Search radius (degrees) when using RA/Dec constraint.

                snr_threshold:
                  type: number
                  default: 3.0
                  minimum: 0
                  description: Signal-to-noise threshold for source detection.

                aperture_radius:
                  type: number
                  default: 7.0
                  minimum: 0
                  description: Aperture radius (pixels) for photometry.

                catalog:
                  type: string
                  enum: [PanSTARRS1, Gaia, SDSS]
                  default: PanSTARRS1
                  description: Reference catalog for photometric calibration.

                obs_band:
                  type: string
                  default: g
                  description: Observed band (label only).

                cal_band:
                  type: string
                  default: r
                  description: Calibration band from catalog.

                return_plot:
                  type: boolean
                  default: false
                  description: If true, return PNG instead of JSON.

                plot_type:
                  type: string
                  enum: [color_correction, image_overlay]
                  default: color_correction
                  description: Plot type to return when return_plot=true.

            example:
              image_url: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"
              ra: 51.11064
              dec: 17.38378
              use_ra_dec: true
              pixel_scale: 2.5
              snr_threshold: 3.0
              aperture_radius: 7.0
              catalog: PanSTARRS1
              obs_band: g
              cal_band: r
              return_plot: true
              plot_type: color_correction

      responses:
        "200":
          description: JSON results or PNG plot image.
          content:
            application/json:
              schema:
                type: object
                properties:
                  photometry:
                    type: object
                    properties:
                      zero_point:
                        type: number
                      color_term:
                        type: number
                      uncertainty:
                        type: number

                  sources:
                    type: object
                    properties:
                      detected:
                        type: integer
                      matched:
                        type: integer

                  astrometry:
                    type: object
                    properties:
                      center_ra_deg:
                        type: number
                      center_dec_deg:
                        type: number
                      pixel_scale:
                        type: number

                  plots:
                    type: object
                    description: Base64 encoded PNG plots (optional)
                    properties:
                      color_correction:
                        type: string
                      image_overlay:
                        type: string

            image/png:
              schema:
                type: string
                format: binary

        "400":
          description: Bad request (invalid input or FITS error)

        "422":
          description: Astrometry could not solve the submitted image.
          content:
            application/json:
              schema:
                type: object

        "503":
          description: Astrometry index files are not ready yet.
          content:
            application/json:
              schema:
                type: object

        "500":
          description: Internal server error
  /subtract_median_background:
    post:
      tags:
      - Background Estimation
      operationId: catch_analysis_tools.app.services.subtract_median_background.perform_median_subtraction
      summary: "Compute the median background with source masking, saving the background-subtracted image as a new FITS file."
      parameters:
        - name: url
          in: query
          description: "Cutout URL from CATCH query"
          example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Background-subtracted image saved as a new FITS file.
          content:
            application/json:
              schema:
                type: object
                description: Path to the background-subtracted FITS file.
                properties:
                  background_subtracted_image_path:
                    description: Path to the background-subtracted FITS file.
                    type: string
  /get_world_coordinates:
    post:
      tags:
      - Target Search
      operationId: catch_analysis_tools.app.services.photometry.get_world_coordinates
      summary: "Retrieve the RA and Dec in decimal degrees from an (x,y) pixel location, using a supplied WCS file."
      parameters:
        - name: WCS_file
          in: query
          description: "WCS file, can be CATCH-generated query URL, a .fits image, or a .wcs file."
          example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
          required: true
          schema:
            type: string
        - name: x
          in: query
          description: "Pixel x location (0-indexed)."
          example: 154
          required: true
          schema:
            type: number
        - name: y
          in: query
          description: "Pixel y location (0-indexed)."
          example: 154
          required: true
          schema:
            type: number
      requestBody:
        required: true
        description: Parameters for pixel-to-world coordinate transformation.
        content:
          application/json:
            schema:
              type: object
              required:
                - WCS_file
                - x
                - y
              properties:
                WCS_file:
                  type: string
                  description: "Cutout URL from CATCH query"
                  example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
                x:
                  type: number
                  description: "Pixel x location."
                  example: 154
                y:
                  type: number
                  description: "Pixel y location."
                  example: 154
      responses:
        "200":
          description: Results of pixel-to-world transformation.
          content:
            application/json:
              schema:
                type: object
                description: Output from photometry.get_world_coordinates(). Contains input location and output WCS values.
                properties:
                  x:
                    description: x pixel coordinate 
                    type: number
                  y:
                    description: y pixel coordinate
                    type: number
                  ra:
                    description: RA value of point in decimal degrees
                    type: number
                  dec:
                    description: Dec value of point in decimal degrees
                    type: number
  /get_pixel_coordinates:
    post:
      tags:
      - Target Search
      operationId: catch_analysis_tools.app.services.photometry.get_pixel_coordinates
      summary: "Retrieve the pixel (x,y) coordinates from RA and Dec world coordinates, using a supplied WCS file."
      parameters:
        - name: WCS_file
          in: query
          description: "WCS file, can be CATCH-generated query URL, a .fits image, or a .wcs file."
          example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
          required: true
          schema:
            type: string
        - name: ra
          in: query
          description: "RA location in decimal degrees."
          example: 13.46483
          required: true
          schema:
            type: number
        - name: dec
          in: query
          description: "Dec location in decimal degrees."
          example: 15.80546
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Results of world-to-pixel transformation.
          content:
            application/json:
              schema:
                type: object
                description: Output from photometry.get_pixel_coordinates(). Contains input location and output pixel coordinates.
                properties:
                  x:
                    description: x pixel coordinate (0-indexed) 
                    type: number
                  y:
                    description: y pixel coordinate (0-indexed)
                    type: number
                  ra:
                    description: RA value of point in decimal degrees
                    type: number
                  dec:
                    description: Dec value of point in decimal degrees
                    type: number
  /target_photometry:
    post:
      tags:
      - Photometry
      operationId: catch_analysis_tools.app.services.photometry.target_extraction
      summary: "Perform aperture photometry on a target using specified target and background aperture configurations."
      requestBody:
        required: true
        description: Image and aperture parameters for photometry extraction.
        content:
          application/json:
            schema:
              type: object
              required:
                - file
                - target_aperture_params
                - background_aperture_params
              properties:
                file:
                  type: string
                  description: "URL or file path of FITS image from CATCH-generated query."
                  example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
                target_aperture_params:
                  type: object
                  description: "Configuration for the target aperture."
                  required:
                    - shape
                    - position
                    - size
                  properties:
                    shape:
                      type: string
                      description: "Shape of aperture (Circular, Rectangular or Circular_Annulus)."
                      example: "Circular"
                    position:
                      type: array
                      description: "Zero-indexed pixel coordinate pair [x, y] for the aperture center."
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                      example: [154, 154]
                    size:
                      type: number
                      description: "Aperture size (radius in pixels) for circular apertures."
                      example: 2
                    inner_r:
                      type: number
                      description: "Inner radius for annulus aperture (pixels)."
                      example: 0
                    outer_r:
                      type: number
                      description: "Outer radius for annulus aperture (pixels)."
                      example: 0
                background_aperture_params:
                  type: object
                  description: "Configuration for the background aperture."
                  required:
                    - shape
                    - position
                    - size
                  properties:
                    shape:
                      type: string
                      description: "Shape of aperture (Circular, Rectangular or Circular_Annulus)."
                      example: "Circular_Annulus"
                    position:
                      type: array
                      description: "Zero-indexed pixel coordinate pair [x, y] for the aperture center."
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                      example: [154, 154]
                    size:
                      type: number
                      description: "Aperture size (radius in pixels) for circular apertures."
                      example: 5
                    inner_r:
                      type: number
                      description: "Inner radius for annulus aperture (pixels)."
                      example: 5
                    outer_r:
                      type: number
                      description: "Outer radius for annulus aperture (pixels)."
                      example: 20
      responses:
        "200":
          description: Photometry results including flux measurements and visualization.
          content:
            application/json:
              schema:
                type: object
                description: Output from photometry extraction with aperture flux and uncertainties.
                properties:
                  aperture_flux:
                    description: Target flux measured within the target aperture.
                    type: number
                  aperture_fluxerr:
                    description: Uncertainty in the aperture flux measurement.
                    type: number
                  aperture_figure:
                    description: File path to the output plot showing apertures on the cutout image.
                    type: string
  /centroid:
    post:
      tags:
      - Target Search
      operationId: catch_analysis_tools.app.services.photometry.centroid
      summary: "Find nearest target centroid to a user-specified point, with user-specified search radius."
      parameters:
        - name: file
          in: query
          description: "Filename of image taken from CATCH-generated query URL."
          example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
          required: true
          schema:
            type: string
        - name: target_x
          in: query
          description: "Target pixel x value, to be used as initial guess for the object."
          example: "155"
          required: true
          schema:
            type: number
        - name: target_y
          in: query
          description: "Target pixel y value, to be used as initial guess for the object."
          example: "155"
          required: true
          schema:
            type: number
        - name: search_radius
          in: query
          description: "Radius in pixels of search area (centered on (target_x,target_y) ) for centroiding."
          example: "7"
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Calibrated magnitude array from chosen aperture photometry settings, and output plot showing the aperture on the cutout
          content:
            application/json:
              schema:
                type: array
                description: Magnitude from source flux with asymmetric uncertainties.
                items:
                  type: object
                  description: Output from photometry.centroid_location(). Array containing search input parameters (initial guess, search radius) and final centroided location.
                  properties:
                    init_guess_x:
                      description: x pixel coordinate of guess
                      type: number
                    init_guess_y:
                      description: y pixel coordinate of guess
                      type: number
                    search_radius:
                      description: Radius in pixels for source search
                      type: number
                    cent_x:
                      description: x pixel coordinate of centroided source
                      type: number
                    cent_y:
                      description: y pixel coordinate of centroided source
                      type: number
                  type: object
                  description: Cutout image showing selected target centroid in the cutout image.
                  properties:
                    centroid_figure:
                      description: Location of centroid plot.
                      type: string
                      
