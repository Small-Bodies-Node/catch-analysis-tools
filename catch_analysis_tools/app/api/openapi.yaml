openapi: "3.0.0"

info:
  title: Catch Analysis Tools
  version: "1.0.0"
  description: >
    Astrometry + photometry pipeline API.
    Use the example payload below to quickly test with a known FITS image.

paths:
  /hello:
    get:
      operationId: catch_analysis_tools.app.services.health.hello
      summary: Basic service liveness endpoint.
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: Hello, World!
  /astrometry:
    post:
      tags:
        - Astrometry
      summary: Perform astrometry and optionally return a plot image.
      operationId: catch_analysis_tools.app.services.astrometry.do_astrometry

      requestBody:
        required: true
        description: >
          Provide parameters for astrometry solving, source detection,
          and photometric calibration.
        content:
          application/json:
            schema:
              type: object
              required:
                - image_url
              properties:
                image_url:
                  type: string
                  description: >
                    URL of FITS image OR local file path (if supported).
                  example: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"

                ra:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: 0
                  maximum: 360
                  description: Right Ascension (deg). Used only if use_ra_dec=true.

                dec:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: -90
                  maximum: 90
                  description: Declination (deg). Used only if use_ra_dec=true.

                use_ra_dec:
                  type: boolean
                  default: false
                  description: >
                    If true, constrain astrometry solve around (ra, dec).
                    If false, perform blind solve.

                pixel_scale:
                  type: number
                  nullable: true
                  default: 2.5
                  description: Pixel scale (arcsec/pixel). Used if scale_low/high not provided.

                scale_low:
                  type: number
                  nullable: true
                  default: null
                  description: Lower bound of pixel scale (arcsec/pixel).

                scale_high:
                  type: number
                  nullable: true
                  default: null
                  description: Upper bound of pixel scale (arcsec/pixel).

                search_radius:
                  type: number
                  default: 2.0
                  minimum: 0
                  description: Search radius (degrees) when using RA/Dec constraint.

                snr_threshold:
                  type: number
                  default: 3.0
                  minimum: 0
                  description: Signal-to-noise threshold for source detection.

                aperture_radius:
                  type: number
                  default: 7.0
                  minimum: 0
                  description: Aperture radius (pixels) for photometry.

                catalog:
                  type: string
                  enum: [PanSTARRS1, Gaia, SDSS]
                  default: PanSTARRS1
                  description: Reference catalog for photometric calibration.

                obs_band:
                  type: string
                  default: g
                  description: Observed band (label only).

                cal_band:
                  type: string
                  default: r
                  description: Calibration band from catalog.

                return_plot:
                  type: boolean
                  default: false
                  description: If true, return PNG instead of JSON.

                plot_type:
                  type: string
                  enum: [color_correction, image_overlay]
                  default: color_correction
                  description: Plot type to return when return_plot=true.

            example:
              image_url: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"
              ra: 51.11064
              dec: 17.38378
              use_ra_dec: true
              pixel_scale: 2.5
              snr_threshold: 3.0
              aperture_radius: 7.0
              catalog: PanSTARRS1
              obs_band: g
              cal_band: r
              return_plot: true
              plot_type: color_correction

      responses:
        "200":
          description: JSON results or PNG plot image.
          content:
            application/json:
              schema:
                type: object
                properties:
                  photometry:
                    type: object
                    properties:
                      zero_point:
                        type: number
                      color_term:
                        type: number
                      uncertainty:
                        type: number

                  sources:
                    type: object
                    properties:
                      detected:
                        type: integer
                      matched:
                        type: integer

                  astrometry:
                    type: object
                    properties:
                      center_ra_deg:
                        type: number
                      center_dec_deg:
                        type: number
                      pixel_scale:
                        type: number

                  plots:
                    type: object
                    description: Base64 encoded PNG plots (optional)
                    properties:
                      color_correction:
                        type: string
                      image_overlay:
                        type: string

            image/png:
              schema:
                type: string
                format: binary

        "400":
          description: Bad request (invalid input or FITS error)

        "500":
          description: Internal server error
  /subtract_median_background:
    post:
      operationId: catch_analysis_tools.app.services.subtract_median_background.perform_median_subtraction
      summary: "Compute the median background with source masking, saving the background-subtracted image as a new FITS file."
      parameters:
        - name: url
          in: query
          description: "Cutout URL from CATCH query"
          example: "https://sbnsurveys.astro.umd.edu/api/images/urn:nasa:pds:gbo.ast.atlas.survey.258:59185:01a59185o0401o.fits?ra=13.46483&dec=15.80546&size=0.16deg&format=fits"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Background-subtracted image saved as a new FITS file.
          content:
            application/json:
              schema:
                type: object
                description: Path to the background-subtracted FITS file.
                properties:
                  background_subtracted_image_path:
                    description: Path to the background-subtracted FITS file.
                    type: string
  /do_default_photometry:
    post:
      operationId: catch_analysis_tools.app.services.photometry.default_extraction
      summary: "Perform a basic (circular aperture, background annulus centered on target) extraction on source nearest to target ephemeris location"
      parameters:
        - name: filebase
          in: query
          description: "Base filename (without .fits or .wcs extension) taken from CATCH-generated query URL."
          example: "65P_atlas_haleakela"
          required: true
          schema:
            type: string
        - name: target_ra
          in: query
          description: "Target Right Ascension ephemeris location, to be used as initial guess for the object."
          example: "39.60040"
          required: true
          schema:
            type: number
        - name: target_dec
          in: query
          description: "Target Declination ephemeris location, to be used as initial guess for the object."
          example: "10.07014"
          required: true
          schema:
            type: number
        - name: search_radius
          in: query
          description: "Radius in pixels of search area (centered on (target_ra,target_dec) ) for centroiding."
          example: "7"
          required: true
          schema:
            type: number
        - name: aperture_size
          in: query
          description: "Radius (in pixels) for source flux extraction aperture."
          example: "7"
          required: true
          schema:
            type: number
        - name: an_in
          in: query
          description: "Radius (in pixels) for inner edge of annulus for background subtraction, centered on target."
          example: "7"
          required: true
          schema:
            type: number
        - name: an_out
          in: query
          description: "Radius (in pixels) for outer edge of annulus for background subtraction, centered on target."
          example: "15"
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Calibrated magnitude array from chosen aperture photometry settings, and output plot showing the aperture on the cutout
          content:
            application/json:
              schema:
                type: array
                description: Magnitude from source flux with asymmetric uncertainties.
                items:
                  type: object
                  description: Output from photometry.centroid_location(). Array containing search input parameters (initial guess, search radius) and final centroided location.
                  properties:
                    search_results:
                      description: Array of input search parameters and output centroid
                    centroid_figure:
                      description: Location of figure showing centroid search
                  type: object
                  description: Output from photometry.calibrated_mag(). Array containing source CALIBRATED magnitude and uncertainties, as [Magnitude, Upper Magnitude Uncertainty, Lower Magnitude Uncertainty].
                  properties:
                    cal_mag:
                      description: Calibrated magnitude
                      type: number
                    cal_mag_hi_uncert:
                      description: Upper uncertainty on calibrated magnitude
                      type: number
                    cal_mag_lo_uncert:
                      description: Lower uncertainty on calibrated magnitude
                      type: number
                  type: object
                  description: Cutout image with aperture
                  properties:
                    aperture_figure:
                      description: Output plot showing the default aperture + annulus extraction onto the cutout image.
                      type: string
                  type: object
                  description: Output from photometry.centroid_location(). Array containing search input parameters (initial guess, search radius) and final centroided location.
                  properties:
                    init_guess_x:
                      description: x pixel coordinate of guess
                      type: number
                    init_guess_y:
                      description: y pixel coordinate of guess
                      type: number
                    init_guess_RA:
                      description: RA value of guess
                      type: number
                    init_guess_Dec:
                      description: Dec value of guess
                      type: number
                    search_radius:
                      description: Radius in pixels for source search
                      type: number
                    cent_x:
                      description: x pixel coordinate of centroided source
                      type: number
                    cent_y:
                      description: y pixel coordinate of centroided source
                      type: number
                    cent_RA:
                      description: RA value of centroided source
                      type: number
                    cent_Dec:
                      description: Dec value of centroided source
                      type: number
                  type: object
                  description: Cutout image showing selected target centroid in the cutout image.
                  properties:
                    centroid_figure:
                      description: Location of centroid plot.
                      type: string
  /get_centroided_target_location:
    post:
      operationId: catch_analysis_tools.app.services.photometry.centroid_location
      summary: "Find nearest target centroid to a user-specified point, with user-specified search radius."
      parameters:
        - name: filebase
          in: query
          description: "Base filename (without .fits or .wcs extension) taken from CATCH-generated query URL."
          example: "65P_atlas_haleakela"
          required: true
          schema:
            type: string
        - name: target_ra
          in: query
          description: "Target pixel RA value, to be used as initial guess for the object."
          example: "39.60040"
          required: true
          schema:
            type: number
        - name: target_dec
          in: query
          description: "Target pixel Dec value, to be used as initial guess for the object."
          example: "10.07014"
          required: true
          schema:
            type: number
        - name: search_radius
          in: query
          description: "Radius in pixels of search area (centered on (target_x,target_y) ) for centroiding."
          example: "7"
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Calibrated magnitude array from chosen aperture photometry settings, and output plot showing the aperture on the cutout
          content:
            application/json:
              schema:
                type: array
                description: Magnitude from source flux with asymmetric uncertainties.
                items:
                  type: object
                  description: Output from photometry.centroid_location(). Array containing search input parameters (initial guess, search radius) and final centroided location.
                  properties:
                    init_guess_x:
                      description: x pixel coordinate of guess
                      type: number
                    init_guess_y:
                      description: y pixel coordinate of guess
                      type: number
                    init_guess_ra:
                      description: RA value of guess
                      type: number
                    init_guess_dec:
                      description: Dec value of guess
                      type: number
                    search_radius:
                      description: Radius in pixels for source search
                      type: number
                    cent_x:
                      description: x pixel coordinate of centroided source
                      type: number
                    cent_y:
                      description: y pixel coordinate of centroided source
                      type: number
                    cent_RA:
                      description: RA value of centroided source
                      type: number
                    cent_Dec:
                      description: Dec value of centroided source
                      type: number
                  type: object
                  description: Cutout image showing selected target centroid in the cutout image.
                  properties:
                    centroid_figure:
                      description: Location of centroid plot.
                      type: string
                      
