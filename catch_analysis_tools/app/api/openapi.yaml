openapi: "3.0.0"

info:
  title: Catch Analysis Tools
  version: "1.0.0"
  description: >
    Astrometry + photometry pipeline API.
    Use the example payload below to quickly test with a known FITS image.

paths:
  /hello:
    get:
      operationId: catch_analysis_tools.app.handlers.hello.hello
      summary: Basic service liveness endpoint.
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: |
                  Catch Analysis Tools is running.
                  package_version=1.0.0
                  docker_image_tag=2026-02-11-001
  /health:
    get:
      operationId: catch_analysis_tools.app.handlers.health.health
      summary: Service health and astrometry data readiness.
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                type: object
  /reset:
    post:
      operationId: catch_analysis_tools.app.handlers.reset.reset
      summary: Force an astrometry data readiness recheck.
      responses:
        "202":
          description: Recheck started.
          content:
            application/json:
              schema:
                type: object
  /astrometry:
    post:
      tags:
        - Astrometry
      summary: Perform astrometry and optionally return a plot image.
      operationId: catch_analysis_tools.app.handlers.astrometry.do_astrometry

      requestBody:
        required: true
        description: >
          Provide parameters for astrometry solving, source detection,
          and photometric calibration.
        content:
          application/json:
            schema:
              type: object
              required:
                - image_url
              properties:
                image_url:
                  type: string
                  description: >
                    URL of FITS image OR local file path (if supported).
                  example: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"

                ra:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: 0
                  maximum: 360
                  description: Right Ascension (deg). Used only if use_ra_dec=true.

                dec:
                  type: number
                  nullable: true
                  default: 0.0
                  minimum: -90
                  maximum: 90
                  description: Declination (deg). Used only if use_ra_dec=true.

                use_ra_dec:
                  type: boolean
                  default: false
                  description: >
                    If true, constrain astrometry solve around (ra, dec).
                    If false, perform blind solve.

                pixel_scale:
                  type: number
                  nullable: true
                  default: 2.5
                  description: Pixel scale (arcsec/pixel). Used if scale_low/high not provided.

                scale_low:
                  type: number
                  nullable: true
                  default: null
                  description: Lower bound of pixel scale (arcsec/pixel).

                scale_high:
                  type: number
                  nullable: true
                  default: null
                  description: Upper bound of pixel scale (arcsec/pixel).

                search_radius:
                  type: number
                  default: 2.0
                  minimum: 0
                  description: Search radius (degrees) when using RA/Dec constraint.

                snr_threshold:
                  type: number
                  default: 3.0
                  minimum: 0
                  description: Signal-to-noise threshold for source detection.

                aperture_radius:
                  type: number
                  default: 7.0
                  minimum: 0
                  description: Aperture radius (pixels) for photometry.

                catalog:
                  type: string
                  enum: [PanSTARRS1, Gaia, SDSS]
                  default: PanSTARRS1
                  description: Reference catalog for photometric calibration.

                obs_band:
                  type: string
                  default: g
                  description: Observed band (label only).

                cal_band:
                  type: string
                  default: r
                  description: Calibration band from catalog.

                return_plot:
                  type: boolean
                  default: false
                  description: If true, return PNG instead of JSON.

                plot_type:
                  type: string
                  enum: [color_correction, image_overlay]
                  default: color_correction
                  description: Plot type to return when return_plot=true.

            example:
              image_url: "https://uxzqjwo0ye.execute-api.us-west-1.amazonaws.com/api/images/urn:nasa:pds:gbo.ast.loneos.survey:data_augmented:060104_1a_099_fits?ra=51.11064&dec=17.38378&size=12.60arcmin&format=fits"
              ra: 51.11064
              dec: 17.38378
              use_ra_dec: true
              pixel_scale: 2.5
              snr_threshold: 3.0
              aperture_radius: 7.0
              catalog: PanSTARRS1
              obs_band: g
              cal_band: r
              return_plot: true
              plot_type: color_correction

      responses:
        "200":
          description: JSON results or PNG plot image.
          content:
            application/json:
              schema:
                type: object
                properties:
                  photometry:
                    type: object
                    properties:
                      zero_point:
                        type: number
                      color_term:
                        type: number
                      uncertainty:
                        type: number

                  sources:
                    type: object
                    properties:
                      detected:
                        type: integer
                      matched:
                        type: integer

                  astrometry:
                    type: object
                    properties:
                      center_ra_deg:
                        type: number
                      center_dec_deg:
                        type: number
                      pixel_scale:
                        type: number

                  plots:
                    type: object
                    description: Base64 encoded PNG plots (optional)
                    properties:
                      color_correction:
                        type: string
                      image_overlay:
                        type: string

            image/png:
              schema:
                type: string
                format: binary

        "400":
          description: Bad request (invalid input or FITS error)

        "422":
          description: Astrometry could not solve the submitted image.
          content:
            application/json:
              schema:
                type: object

        "503":
          description: Astrometry index files are not ready yet.
          content:
            application/json:
              schema:
                type: object

        "500":
          description: Internal server error
