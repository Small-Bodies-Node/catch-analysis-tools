services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: "${DOCKER_IMAGE_NAME:-sbn-cat}:${DOCKER_IMAGE_TAG:-local}"
    environment:
      DOCKER_IMAGE_TAG: "${DOCKER_IMAGE_TAG:-local}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - "${ASTROMETRY_HOST_DATA_DIR:-${HOME}/.astrometry/data}:/root/.astrometry/data"
